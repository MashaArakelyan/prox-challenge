<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580">
  <defs>
    <linearGradient id="cdBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0d9cb" />
      <stop offset="55%" stop-color="#c2bbac" />
      <stop offset="100%" stop-color="#9d9586" />
    </linearGradient>
    <linearGradient id="cdBodyHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,250,0.45)" />
      <stop offset="100%" stop-color="rgba(255,255,250,0)" />
    </linearGradient>
    <radialGradient id="cdKnob" cx="32%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#5a5450" />
      <stop offset="60%" stop-color="#262220" />
      <stop offset="100%" stop-color="#0e0c0a" />
    </radialGradient>
    <filter id="cdShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="8" result="off" />
      <feComponentTransfer><feFuncA type="linear" slope="0.22" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="cdPaper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3" />
      <feColorMatrix values="0 0 0 0 0.95  0 0 0 0 0.9  0 0 0 0 0.8  0 0 0 0.06 0" />
      <feComposite in2="SourceGraphic" operator="in" />
    </filter>
  </defs>

  <rect width="800" height="580" fill="#FAF6EC" />
